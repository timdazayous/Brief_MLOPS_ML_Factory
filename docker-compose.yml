services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # S3 API (Requis pour train.py sur l'hôte)
      - "9001:9001" # Console (Requis pour voir les fichiers)
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - ml-factory-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.2
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${DOCKER_MLFLOW_S3_ENDPOINT_URL}
      MLFLOW_S3_IGNORE_TLS: "true"
    depends_on:
      - minio
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped
    networks:
      - ml-factory-net

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: ml_api
    # ports:
    #   - "8000:8000" # Caché de l'hôte, accessible uniquement par le front via Docker
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${DOCKER_MLFLOW_S3_ENDPOINT_URL}
      MLFLOW_TRACKING_URI: ${DOCKER_MLFLOW_TRACKING_URI}
      MLFLOW_S3_IGNORE_TLS: "true"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - mlflow
      - minio
    volumes:
      - ./src:/app/src
    restart: unless-stopped
    networks:
      - ml-factory-net

  front:
    build:
      context: .
      dockerfile: src/front/Dockerfile
    container_name: ml_front
    ports:
      - "8501:8501" # Seul port exposé à l'extérieur (Hôte / Internet via tunnel)
    environment:
      API_URL: ${API_URL}
    depends_on:
      - api
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - ml-factory-net

networks:
  ml-factory-net:
    driver: bridge

volumes:
  minio_data:
  mlflow_data:
